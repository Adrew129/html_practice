<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button</title>
    <style>
        .subscribe-button{
            background-color: red;
            color: white;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 10px;
            padding-bottom: 10px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: opacity 0.3s ease;
            vertical-align: top;
        }
        .subscribe-button:hover{
            opacity: 0.8;
        }
        .subscribe-button:active{
            opacity: 0.6;
        
        }

        .join-button{
            background-color: white;
            border-color: rgb(41, 118, 211);
            border-style: solid;
            border-width: 1px;
            color: rgb(41, 118, 211);
            height: 36px;
            width: 62px;
            border-radius: 2px;
            cursor: pointer;
            margin-left: 8px;
            transition: box-shadow 0.15s ease, color 0.15s ease;
        }

        .join-button:hover{
            background-color: rgb(41, 118, 211);
            color: white;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
        }
        .join-button:active{
            opacity: 0.7;
        }
        .tweet-button{
            background-color: rgb(2, 137, 255);
            color: white;
            height: 36px;
            width: 76px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            margin-left: 8px;
            
            
        }
            .tweet-button:hover{
                background-color: rgb(2, 137, 255);
                opacity: 0.8;
                box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
            }
    </style>
</head>
<body>
    <button class="subscribe-button">Subscribe</button>
    <button class="join-button">Join</button>
    <button class="tweet-button">Tweet</button>
</body>
</html>
